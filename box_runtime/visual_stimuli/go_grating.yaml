# Example "go" drifting grating used by VisualStim.
name: go_grating
duration_s: 1.0
angle_deg: 45.0
# Spatial frequency is measured in cycles per visual degree.
spatial_freq_cpd: 0.08
temporal_freq_hz: 1.5
contrast: 0.9
# Neutral background gray in uint8 display units.
background_gray_u8: 96
waveform: sine
